<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dumpboard</title>

<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  DUMPBOARD — HUB (feed)                                              ║
  ║  Design: Figma „Main page - feed” (node 2:76).                        ║
  ║  Czyta people.json → <folder>/feed.json. Masonry, ciemny motyw.      ║
  ╚══════════════════════════════════════════════════════════════════════╝
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0e0e;
    color: #fff;
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Nagłówek (Figma: top 18px, px 64, logo 32px + przycisk pill) ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 64px;
    max-width: 1440px;
    margin: 0 auto;
  }

  .logo {
    display: block;
    width: 32px;
    height: 32px;
    flex-shrink: 0;
  }
  .logo img { display: block; width: 100%; height: 100%; }

  .create-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 16px;
    border-radius: 999px;
    background: #fff;
    color: #0e0e0e;
    font-size: 16px;
    font-weight: 600;
    line-height: normal;
    text-decoration: none;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .create-btn:hover { opacity: 0.88; }

  /* ── Licznik dumpboarders (Figma: 14px, opacity 40%, gap 4px) ─────── */
  .counter {
    display: flex;
    align-items: baseline;
    gap: 4px;
    padding: 48px 64px 0;
    max-width: 1440px;
    margin: 0 auto;
    font-size: 14px;
    line-height: 20px;
    color: #fff;
    opacity: 0.4;
  }
  .counter .num { font-weight: 600; }

  /* ── Masonry feed (Figma: kolumny 310px, gap 24px, px 64) ─────────── */
  main {
    max-width: 1440px;
    margin: 0 auto;
    padding: 18px 64px 64px;
  }

  #feed {
    column-width: 310px;
    column-gap: 24px;
  }

  .pin {
    break-inside: avoid;
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Media: zaokrąglenie 16px, placeholder #1f1f1f */
  .pin-media {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: #1f1f1f;
  }

  .pin-media img {
    display: block;
    width: 100%;
    height: auto;
  }

  .pin-media .ph {
    aspect-ratio: 4 / 3;
    background: #1f1f1f;
  }

  /* YouTube: miniatura + play */
  .pin-media a.yt { display: block; position: relative; }
  .pin-media .yt-badge {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 54px; height: 38px;
    border-radius: 9px;
    background: rgba(255, 0, 0, 0.88);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    padding-left: 2px;
    pointer-events: none;
  }

  /* Handle pod zdjęciem (Figma: Inter Medium 14px, opacity 60%) */
  .pin-handle {
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    color: #fff;
    opacity: 0.6;
    text-decoration: none;
    word-break: break-word;
  }
  .pin-handle:hover { opacity: 0.85; }

  /* ── Stany: ładowanie / pusto ─────────────────────────────────────── */
  .state {
    text-align: center;
    padding: 80px 24px;
    color: #fff;
    opacity: 0.4;
    font-size: 14px;
    line-height: 20px;
  }
  .state h2 {
    font-size: 16px;
    font-weight: 600;
    opacity: 1;
    color: #fff;
    margin: 0 0 12px;
  }
  .state .create-btn { margin-top: 24px; }
  .hidden { display: none !important; }

  @media (max-width: 720px) {
    header, .counter, main { padding-left: 24px; padding-right: 24px; }
  }
</style>
</head>
<body>

  <header>
    <a class="logo" href="hub.html" aria-label="Dumpboard">
      <img src="assets/landing/logo.svg" alt="">
    </a>
    <a class="create-btn" href="canvas-editor.html">Create your dump</a>
  </header>

  <p class="counter hidden" id="counter">
    <span class="num" id="counter-num">0</span>
    <span>dumpboarders</span>
  </p>

  <main>
    <div class="state" id="loading">Loading feed…</div>

    <div class="state hidden" id="empty">
      <h2>No dumps yet</h2>
      <p>Be the first to create yours.</p>
      <a class="create-btn" href="canvas-editor.html">Create your dump</a>
    </div>

    <div id="feed" class="hidden"></div>
  </main>

<script>
/* ════════════════════════════════════════════════════════════════════
   DANE — people.json → <folder>/feed.json (+ opcjonalnie profile.json)
   ════════════════════════════════════════════════════════════════════ */
const PEOPLE_FILE = "people.json";

let allPins = [];

const feedEl     = document.getElementById("feed");
const loadingEl  = document.getElementById("loading");
const emptyEl    = document.getElementById("empty");
const counterEl  = document.getElementById("counter");
const counterNum = document.getElementById("counter-num");

/** Handle jak w Figmie: @monika.nowak — z nicku lub nazwy profilu */
function handleFor(pin) {
  const raw = (pin.handle || pin.nick || pin.folder || "").trim();
  const h = raw.replace(/^@/, "").toLowerCase();
  return "@" + h;
}

async function loadAll() {
  let people = [];
  try {
    const res = await fetch(PEOPLE_FILE, { cache: "no-cache" });
    if (res.ok) {
      const data = await res.json();
      people = Array.isArray(data.people) ? data.people : [];
    }
  } catch (e) {
    console.warn("Nie udało się wczytać", PEOPLE_FILE, e);
  }

  const pins = [];
  for (const person of people) {
    if (!person || !person.folder) continue;
    const folder = person.folder.replace(/\/+$/, "");
    const nick = person.nick || folder;

    try {
      const res = await fetch(folder + "/feed.json", { cache: "no-cache" });
      if (!res.ok) continue;
      const feed = await res.json();
      const items = Array.isArray(feed.items) ? feed.items : [];
      if (!items.length) continue;

      let prof = {};
      try {
        const pr = await fetch(folder + "/profile.json", { cache: "no-cache" });
        if (pr.ok) prof = await pr.json();
      } catch (e) { /* brak profilu */ }

      const name = (prof.name && String(prof.name).trim()) ? String(prof.name).trim() : "";
      const profNick = (prof.nick && String(prof.nick).trim()) ? String(prof.nick).trim() : "";

      for (const it of items) {
        if (!it) continue;
        const common = {
          nick, folder, name,
          handle: profNick || nick,
          page: folder + "/index.html",
        };
        if (it.videoId) {
          pins.push({
            ...common, kind: "youtube",
            videoId: it.videoId,
            thumb: "https://img.youtube.com/vi/" + it.videoId + "/hqdefault.jpg",
            watch: "https://www.youtube.com/watch?v=" + it.videoId,
          });
        } else if (it.file) {
          pins.push({ ...common, kind: "image", src: folder + "/" + it.file });
        }
      }
    } catch (e) {
      console.warn("Pomijam osobę:", folder, e);
    }
  }

  allPins = pins;
  render();
}

function updateCounter() {
  const n = new Set(allPins.map(p => p.nick)).size;
  if (!n) {
    counterEl.classList.add("hidden");
    return;
  }
  counterNum.textContent = String(n);
  counterEl.classList.remove("hidden");
}

function render() {
  loadingEl.classList.add("hidden");
  updateCounter();

  if (!allPins.length) {
    feedEl.classList.add("hidden");
    emptyEl.classList.remove("hidden");
    return;
  }

  emptyEl.classList.add("hidden");
  feedEl.classList.remove("hidden");
  feedEl.innerHTML = "";
  allPins.forEach(pin => feedEl.appendChild(makePin(pin)));
}

function brokenPlaceholder() {
  const ph = document.createElement("div");
  ph.className = "ph";
  return ph;
}

function makeMedia(pin) {
  const wrap = document.createElement("div");
  wrap.className = "pin-media";

  if (pin.kind === "youtube") {
    const a = document.createElement("a");
    a.className = "yt";
    a.href = pin.watch;
    a.target = "_blank";
    a.rel = "noopener";
    a.title = "Open on YouTube";
    const img = document.createElement("img");
    img.src = pin.thumb;
    img.loading = "lazy";
    img.alt = "";
    img.addEventListener("error", () => img.replaceWith(brokenPlaceholder()));
    const badge = document.createElement("span");
    badge.className = "yt-badge";
    badge.textContent = "▶";
    a.append(img, badge);
    wrap.appendChild(a);
    return wrap;
  }

  const img = document.createElement("img");
  img.src = pin.src;
  img.loading = "lazy";
  img.alt = "";
  img.addEventListener("error", () => img.replaceWith(brokenPlaceholder()));
  wrap.appendChild(img);
  return wrap;
}

function makePin(pin) {
  const art = document.createElement("article");
  art.className = "pin";
  art.appendChild(makeMedia(pin));

  const handle = document.createElement("a");
  handle.className = "pin-handle";
  handle.href = pin.page;
  handle.textContent = handleFor(pin);
  handle.title = "View page";
  art.appendChild(handle);

  return art;
}

loadAll();
</script>

</body>
</html>
