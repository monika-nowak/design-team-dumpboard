<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dumpboard</title>

<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  DUMPBOARD — HUB (feed)                                              ║
  ║  Design: Figma „Main page - feed” (node 2:76).                        ║
  ║  Reads people.json → people/<nick>/feed.json. Masonry, dark theme.     ║
  ╚══════════════════════════════════════════════════════════════════════╝
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0e0e;
    color: #fff;
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Nagłówek (Figma: top 18px, px 64, logo 32px + przycisk pill) ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 64px;
    max-width: 1440px;
    margin: 0 auto;
  }

  .logo {
    display: block;
    width: 32px;
    height: 32px;
    flex-shrink: 0;
  }
  .logo img { display: block; width: 100%; height: 100%; }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .how-btn,
  .create-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 16px;
    border-radius: 999px;
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    font-size: 16px;
    font-weight: 600;
    line-height: normal;
    text-decoration: none;
    white-space: nowrap;
    transition: opacity 0.15s;
  }

  .how-btn {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border: none;
    cursor: pointer;
    appearance: none;
  }
  .how-btn img {
    width: 20px;
    height: 20px;
    display: block;
    flex-shrink: 0;
  }

  .create-btn {
    background: #fff;
    color: #0e0e0e;
  }
  .how-btn:hover,
  .create-btn:hover { opacity: 0.88; }

  /* ── Licznik dumpboarders (Figma: 14px, opacity 40%, gap 4px) ─────── */
  .counter {
    display: flex;
    align-items: baseline;
    gap: 4px;
    padding: 48px 64px 0;
    max-width: 1440px;
    margin: 0 auto;
    font-size: 14px;
    line-height: 20px;
    color: #fff;
    opacity: 0.4;
  }
  .counter .num { font-weight: 600; }

  /* ── Masonry feed (Figma: kolumny 310px, gap 24px, px 64) ─────────── */
  main {
    max-width: 1440px;
    margin: 0 auto;
    padding: 18px 64px 64px;
  }

  #feed {
    column-width: 310px;
    column-gap: 24px;
  }

  .pin {
    break-inside: avoid;
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Media: zaokrąglenie 16px, placeholder #1f1f1f */
  .pin-media {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: #1f1f1f;
  }

  .pin-media img {
    display: block;
    width: 100%;
    height: auto;
  }

  .pin-media .ph {
    aspect-ratio: 4 / 3;
    background: #1f1f1f;
  }

  /* YouTube: miniatura + play */
  .pin-media a.yt { display: block; position: relative; }
  .pin-media .yt-badge {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 54px; height: 38px;
    border-radius: 9px;
    background: rgba(255, 0, 0, 0.88);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    padding-left: 2px;
    pointer-events: none;
  }

  /* Autor pod kafelkiem (Figma 15:671 — avatar 24px + @handle, gap 8px) */
  .pin-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: inherit;
    min-width: 0;
  }
  .pin-meta:hover .pin-handle { opacity: 0.85; }

  .pin-avatar {
    width: 24px;
    height: 24px;
    border-radius: 999px;
    flex-shrink: 0;
    background: rgba(255, 255, 255, 0.1);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    line-height: 1;
    color: rgba(255, 255, 255, 0.6);
    user-select: none;
  }
  .pin-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Handle (Figma: Inter Medium 14px, opacity 60%) */
  .pin-handle {
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    color: #fff;
    opacity: 0.6;
    word-break: break-word;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Stany: ładowanie / pusto ─────────────────────────────────────── */
  .state {
    text-align: center;
    padding: 80px 24px;
    color: #fff;
    opacity: 0.4;
    font-size: 14px;
    line-height: 20px;
  }
  .state h2 {
    font-size: 16px;
    font-weight: 600;
    opacity: 1;
    color: #fff;
    margin: 0 0 12px;
  }
  .state .create-btn { margin-top: 24px; }
  .hidden { display: none !important; }

  /* ── Modal „How it works" (Figma 24:1246 — karuzela) ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.show { display: flex; }

  .glass-surface {
    background: rgba(14, 14, 14, 0.5);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
  }

  .how-popup {
    position: relative;
    width: 600px;
    max-width: calc(100vw - 48px);
    height: 600px;
    max-height: calc(100vh - 48px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0;
  }
  .how-close-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 2;
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
  }
  .how-close-btn:hover { background: rgba(255, 255, 255, 0.14); }
  .how-close-btn svg { width: 20px; height: 20px; display: block; }
  .how-picture {
    flex-shrink: 0;
    overflow: hidden;
    background: #0e0e0e;
  }
  .how-picture img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  .how-panel {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px;
    gap: 32px;
  }
  .how-dots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    height: 8px;
    flex-shrink: 0;
  }
  .how-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    flex-shrink: 0;
  }
  .how-dot.is-active { background: rgba(255, 255, 255, 0.8); }
  .how-copy {
    width: 100%;
    text-align: center;
    word-break: break-word;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .how-copy h2 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    line-height: normal;
    color: #fff;
  }
  .how-copy p {
    margin: 0;
    font-size: 16px;
    line-height: 24px;
    color: rgba(255, 255, 255, 0.6);
  }
  .how-copy strong { font-weight: 600; color: inherit; }
  .how-copy a { color: #fff; text-decoration: none; }
  .how-copy a:hover { text-decoration: underline; }
  .how-next {
    appearance: none;
    border: none;
    background: #fff;
    color: #0e0e0e;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    line-height: normal;
    padding: 12px 16px;
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .how-next:hover { background: rgba(255, 255, 255, 0.88); }
  @media (max-height: 640px) {
    .how-popup { height: auto; }
    .how-picture { flex: 1 1 0; min-height: 140px; }
  }

  .pop-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .pop-close:hover { background: rgba(255, 255, 255, 0.14); }
  .pop-close svg { width: 20px; height: 20px; display: block; }

  @media (max-width: 720px) {
    header, .counter, main { padding-left: 24px; padding-right: 24px; }
  }
</style>
</head>
<body>

  <header>
    <a class="logo" href="index.html" aria-label="Dumpboard">
      <img src="assets/landing/logo.svg" alt="">
    </a>
    <div class="header-actions">
      <button type="button" class="how-btn" id="how-it-works-btn">
        <img src="assets/icons/seal-question.svg" alt="" aria-hidden="true">
        How it works
      </button>
      <a class="create-btn" id="header-cta" href="canvas-editor.html">Create your dump</a>
    </div>
  </header>

  <p class="counter hidden" id="counter">
    <span class="num" id="counter-num">0</span>
    <span>dumpboarders</span>
  </p>

  <main>
    <div class="state" id="loading">Loading feed…</div>

    <div class="state hidden" id="empty">
      <h2>No dumps yet</h2>
      <p>Be the first to create yours.</p>
      <a class="create-btn" href="canvas-editor.html">Create your dump</a>
    </div>

    <div id="feed" class="hidden"></div>
  </main>

  <!-- Modal: How it works (Figma 24:1246 — carousel) -->
  <div class="modal-overlay" id="how-modal" role="dialog" aria-modal="true" aria-labelledby="how-title">
    <div class="how-popup glass-surface">
      <button type="button" class="how-close-btn" id="how-modal-close" aria-label="Close">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <div class="how-picture" id="how-picture">
        <img id="how-picture-img" src="" alt="">
      </div>
      <div class="how-panel">
        <div class="how-dots" id="how-dots" aria-hidden="true"></div>
        <div class="how-copy">
          <h2 id="how-title"></h2>
          <p id="how-desc"></p>
        </div>
        <button type="button" class="how-next" id="how-next">Next</button>
      </div>
    </div>
  </div>

<script>
/* ════════════════════════════════════════════════════════════════════
   DATA — people.json → folder/feed.json (+ optional profile.json)
   ════════════════════════════════════════════════════════════════════ */
const PEOPLE_FILE = "people.json";

/** Bypass GitHub Pages CDN cache for JSON files (people.json, feed.json). */
function jsonUrl(path) {
  return path + (path.includes("?") ? "&" : "?") + "_=" + Date.now();
}

let allPins = [];
let knownPeople = [];

const feedEl     = document.getElementById("feed");
const loadingEl  = document.getElementById("loading");
const emptyEl    = document.getElementById("empty");
const counterEl  = document.getElementById("counter");
const counterNum = document.getElementById("counter-num");

/** Handle jak w Figmie: @monika.nowak — z nicku lub nazwy profilu */
function handleFor(pin) {
  const raw = (pin.handle || pin.nick || pin.folder || "").trim();
  const h = raw.replace(/^@/, "").toLowerCase();
  return "@" + h;
}

/** Inicjał avatara — z nazwy profilu, nicku lub folderu */
function initialFor(pin) {
  const base = (pin.name || pin.handle || pin.nick || pin.folder || "?")
    .replace(/^@/, "").trim();
  return (base.charAt(0) || "?").toUpperCase();
}

/** Remember nick in this browser — hub uses it for the header button. */
function saveNickLocal(nick) {
  const n = String(nick || "").trim().replace(/^@+/, "").toLowerCase();
  if (!n) return;
  try { localStorage.setItem("dumpboard_nick", n); } catch (e) {}
}

function getStoredNick() {
  try { return (localStorage.getItem("dumpboard_nick") || "").toLowerCase(); } catch (e) { return ""; }
}

/** “Create your dump” → “My dump” when this browser knows a published page. */
function updateHeaderCta(people) {
  const btn = document.getElementById("header-cta");
  if (!btn) return;
  const nick = getStoredNick();
  const person = people.find(p => (p.nick || "").toLowerCase() === nick);
  if (person && person.folder) {
    btn.textContent = "My dump";
    btn.href = person.folder.replace(/\/+$/, "") + "/index.html";
  } else {
    btn.textContent = "Create your dump";
    btn.href = "canvas-editor.html";
  }
}

async function loadAll() {
  let people = [];
  try {
    const res = await fetch(jsonUrl(PEOPLE_FILE), { cache: "no-store" });
    if (res.ok) {
      const data = await res.json();
      people = Array.isArray(data.people) ? data.people : [];
    }
  } catch (e) {
    console.warn("Could not load", PEOPLE_FILE, e);
  }

  knownPeople = people;
  updateHeaderCta(people);

  const pins = [];
  for (const person of people) {
    if (!person || !person.folder) continue;
    const folder = person.folder.replace(/\/+$/, "");
    const nick = person.nick || folder;

    try {
      const res = await fetch(jsonUrl(folder + "/feed.json"), { cache: "no-store" });
      if (!res.ok) continue;
      const feed = await res.json();
      const items = Array.isArray(feed.items) ? feed.items : [];
      if (!items.length) continue;

      let prof = {};
      try {
        const pr = await fetch(jsonUrl(folder + "/profile.json"), { cache: "no-store" });
        if (pr.ok) prof = await pr.json();
      } catch (e) { /* brak profilu */ }

      const name = (prof.name && String(prof.name).trim()) ? String(prof.name).trim() : "";
      const profNick = (prof.nick && String(prof.nick).trim()) ? String(prof.nick).trim() : "";
      const avatarFile = prof.avatar && String(prof.avatar).trim();
      const avatar = avatarFile ? folder + "/" + avatarFile.replace(/^\//, "") : null;
      const initial = initialFor({ name, handle: profNick || nick, nick, folder });

      for (const it of items) {
        if (!it) continue;
        const common = {
          nick, folder, name,
          handle: profNick || nick,
          page: folder + "/index.html",
          avatar, initial,
        };
        if (it.videoId) {
          pins.push({
            ...common, kind: "youtube",
            videoId: it.videoId,
            thumb: "https://img.youtube.com/vi/" + it.videoId + "/hqdefault.jpg",
            watch: "https://www.youtube.com/watch?v=" + it.videoId,
          });
        } else if (it.file) {
          pins.push({ ...common, kind: "image", src: folder + "/" + it.file });
        }
      }
    } catch (e) {
      console.warn("Skipping person:", folder, e);
    }
  }

  allPins = pins;
  render();
}

function updateCounter() {
  const n = new Set(allPins.map(p => p.nick)).size;
  if (!n) {
    counterEl.classList.add("hidden");
    return;
  }
  counterNum.textContent = String(n);
  counterEl.classList.remove("hidden");
}

function render() {
  loadingEl.classList.add("hidden");
  updateCounter();

  if (!allPins.length) {
    feedEl.classList.add("hidden");
    emptyEl.classList.remove("hidden");
    return;
  }

  emptyEl.classList.add("hidden");
  feedEl.classList.remove("hidden");
  feedEl.innerHTML = "";
  allPins.forEach(pin => feedEl.appendChild(makePin(pin)));
}

function brokenPlaceholder() {
  const ph = document.createElement("div");
  ph.className = "ph";
  return ph;
}

function makeMedia(pin) {
  const wrap = document.createElement("div");
  wrap.className = "pin-media";

  if (pin.kind === "youtube") {
    const a = document.createElement("a");
    a.className = "yt";
    a.href = pin.watch;
    a.target = "_blank";
    a.rel = "noopener";
    a.title = "Open on YouTube";
    const img = document.createElement("img");
    img.src = pin.thumb;
    img.loading = "lazy";
    img.alt = "";
    img.addEventListener("error", () => img.replaceWith(brokenPlaceholder()));
    const badge = document.createElement("span");
    badge.className = "yt-badge";
    badge.textContent = "▶";
    a.append(img, badge);
    wrap.appendChild(a);
    return wrap;
  }

  const img = document.createElement("img");
  img.src = pin.src;
  img.loading = "lazy";
  img.alt = "";
  img.addEventListener("error", () => img.replaceWith(brokenPlaceholder()));
  wrap.appendChild(img);
  return wrap;
}

function makeAvatar(pin) {
  const el = document.createElement("span");
  el.className = "pin-avatar";
  el.setAttribute("aria-hidden", "true");
  if (pin.avatar) {
    const img = document.createElement("img");
    img.src = pin.avatar;
    img.alt = "";
    img.loading = "lazy";
    img.addEventListener("error", () => {
      img.remove();
      el.textContent = pin.initial;
    });
    el.appendChild(img);
  } else {
    el.textContent = pin.initial;
  }
  return el;
}

function makePin(pin) {
  const art = document.createElement("article");
  art.className = "pin";
  art.appendChild(makeMedia(pin));

  const meta = document.createElement("a");
  meta.className = "pin-meta";
  meta.href = pin.page;
  meta.title = "View page";
  meta.addEventListener("click", () => {
    saveNickLocal(pin.nick);
    updateHeaderCta(knownPeople);
  });
  meta.appendChild(makeAvatar(pin));

  const handle = document.createElement("span");
  handle.className = "pin-handle";
  handle.textContent = handleFor(pin);
  meta.appendChild(handle);
  art.appendChild(meta);

  return art;
}

/* ── Modal „How it works" (Figma 24:1246) ─────────────────────────── */
const HOW_STEPS = [
  {
    title: "Set your nick and avatar",
    pictureH: 317,
    image: "assets/how-it-works/step-1.png",
    body: "On first visit, enter your nick <strong>(e.g.&nbsp;john.smith)</strong> – no spaces. This becomes your GitHub folder name:&nbsp;<strong>people/your-nick/</strong>. Click your avatar to set your profile and photo.",
  },
  {
    title: "Add media",
    pictureH: 317,
    image: "assets/how-it-works/step-2.png",
    body: "Use the grid to add an <strong>image</strong> or <strong>YouTube</strong> video (the placeholder is always visible). Add a caption if you like – these items go to the shared team feed.",
  },
  {
    title: "Decorate your page",
    pictureH: 365,
    image: "assets/how-it-works/step-3.png",
    body: "Add <strong>stickers</strong>, <strong>text</strong>, and <strong>drawings</strong>, and change the <strong>background</strong> color.",
  },
  {
    title: "Download the ZIP",
    pictureH: 293,
    image: "assets/how-it-works/step-4.png",
    body: "Click <strong>Download</strong>. Your browser saves a ZIP file, e.g.&nbsp;<strong>john.smith.zip</strong>. Unzip. Open the unzipped folder – you should see files like <strong>index.html</strong>, <strong>project.json</strong>. Keep this folder handy for the next step.<br><br><strong>Tip:</strong> rename the unzipped folder to your nick (e.g.&nbsp;<strong>john.smith</strong>).",
  },
  {
    title: "Open the repo on GitHub",
    pictureH: 317,
    image: "assets/how-it-works/step-5.png",
    body: 'Go to <a href="https://github.com/monika-nowak/design-team-dumpboard" target="_blank" rel="noopener">https://github.com/monika-nowak/design-team-dumpboard</a>. Click the <strong>people</strong> folder in the file list. You should now be inside <strong>people/</strong>.',
  },
  {
    title: "Upload your folder",
    pictureH: 317,
    image: "assets/how-it-works/step-6.png",
    body: "Click <strong>Add file</strong> → <strong>Upload files</strong>. Drag your <strong>whole unzipped folder</strong> (e.g.&nbsp;<strong>john.smith</strong>) into the upload area. Click <strong>Commit changes</strong>. GitHub creates the folder for you – no need to create it manually.",
  },
  {
    title: "See it live & update later",
    pictureH: 269,
    image: "assets/how-it-works/step-7.png",
    body: 'Wait 1–2 minutes, then check: your page: <strong>…/people/your-nick/</strong> and team feed: <a href="https://monika-nowak.github.io/design-team-dumpboard/hub.html" target="_blank" rel="noopener">https://monika-nowak.github.io/design-team-dumpboard/hub.html</a>. Hard-refresh if needed: <strong>Cmd+Shift+R</strong> / <strong>Ctrl+Shift+R</strong>. To update: open your page → <strong>Edit page</strong> → change things → <strong>Download</strong> → unzip → upload again to the same folder (replace the old files).',
  },
];
const howModal = document.getElementById("how-modal");
const howPicture = document.getElementById("how-picture");
const howPictureImg = document.getElementById("how-picture-img");
const howDots = document.getElementById("how-dots");
const howTitle = document.getElementById("how-title");
const howDesc = document.getElementById("how-desc");
const howNext = document.getElementById("how-next");
let howStep = 0;

howDots.innerHTML = HOW_STEPS.map((_, i) =>
  `<span class="how-dot${i === 0 ? " is-active" : ""}"></span>`).join("");

function renderHowStep() {
  const step = HOW_STEPS[howStep];
  howPicture.style.height = step.pictureH + "px";
  howPictureImg.src = step.image;
  howTitle.textContent = step.title;
  howDesc.innerHTML = step.body;
  howNext.textContent = howStep === HOW_STEPS.length - 1 ? "Ok, I got it!" : "Next";
  howDots.querySelectorAll(".how-dot").forEach((dot, i) => {
    dot.classList.toggle("is-active", i === howStep);
  });
}

function openHowModal() {
  howStep = 0;
  renderHowStep();
  howModal.classList.add("show");
}

function closeHowModal() {
  howModal.classList.remove("show");
}

document.getElementById("how-it-works-btn").addEventListener("click", openHowModal);
document.getElementById("how-modal-close").addEventListener("click", closeHowModal);
howNext.addEventListener("click", () => {
  if (howStep < HOW_STEPS.length - 1) {
    howStep++;
    renderHowStep();
  } else {
    closeHowModal();
  }
});
howModal.addEventListener("click", e => { if (e.target === howModal) closeHowModal(); });
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && howModal.classList.contains("show")) closeHowModal();
});

if (new URLSearchParams(location.search).get("how")) {
  openHowModal();
  history.replaceState(null, "", location.pathname);
}

loadAll();
</script>

</body>
