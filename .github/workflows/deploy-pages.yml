name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build people.json at deploy time — bot commits don't re-trigger this workflow,
      # so we must not rely on the committed people.json from the checkout alone.
      - name: Build people.json from people/ folders
        run: |
          mkdir -p people
          {
            echo '{'
            echo '  "people": ['
            first=true
            for dir in people/*/; do
              [ -d "$dir" ] || continue
              nick="${dir#people/}"
              nick="${nick%/}"
              [ -f "people/$nick/index.html" ] || [ -f "people/$nick/feed.json" ] || continue
              if [ "$first" = true ]; then first=false; else echo ','; fi
              printf '    { "nick": "%s", "folder": "people/%s" }' "$nick" "$nick"
            done
            echo ''
            echo '  ]'
            echo '}'
          } > people.json
          echo "── people.json for deploy ──"
          cat people.json

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
