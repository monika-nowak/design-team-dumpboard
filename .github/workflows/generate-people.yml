name: Generate people.json

# Scans only people/<nick>/ — keeps participant uploads separate from hub code.
# people.json entries: { "nick", "folder": "people/<nick>" }

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build people.json from people/ folders
        run: |
          mkdir -p people
          {
            echo '{'
            echo '  "people": ['
            first=true
            for dir in people/*/; do
              [ -d "$dir" ] || continue
              nick="${dir#people/}"
              nick="${nick%/}"
              [ -f "people/$nick/index.html" ] || [ -f "people/$nick/feed.json" ] || continue
              if [ "$first" = true ]; then first=false; else echo ','; fi
              printf '    { "nick": "%s", "folder": "people/%s" }' "$nick" "$nick"
            done
            echo ''
            echo '  ]'
            echo '}'
          } > people.json

          echo "── Generated people.json ──"
          cat people.json

      - name: Commit changes (if any)
        run: |
          if git diff --quiet -- people.json; then
            echo "people.json unchanged — nothing to commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add people.json
            git commit -m "auto: update people.json"
            git push
          fi
