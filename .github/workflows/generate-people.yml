name: Generuj people.json

# Skanuje wyłącznie people/<nick>/ — uczestnicy nie mieszają z kodem huba.
# people.json: { "nick", "folder": "people/<nick>" }

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zbuduj people.json z folderów w people/
        run: |
          mkdir -p people
          {
            echo '{'
            echo '  "people": ['
            first=true
            for dir in people/*/; do
              [ -d "$dir" ] || continue
              nick="${dir#people/}"
              nick="${nick%/}"
              # pomiń README i inne pliki w people/ (tylko podfoldery z treścią)
              [ -f "people/$nick/index.html" ] || [ -f "people/$nick/feed.json" ] || continue
              if [ "$first" = true ]; then first=false; else echo ','; fi
              printf '    { "nick": "%s", "folder": "people/%s" }' "$nick" "$nick"
            done
            echo ''
            echo '  ]'
            echo '}'
          } > people.json

          echo "── Wygenerowany people.json ──"
          cat people.json

      - name: Zapisz zmiany (jeśli są)
        run: |
          if git diff --quiet -- people.json; then
            echo "people.json bez zmian — nic do zapisania."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add people.json
            git commit -m "auto: aktualizacja people.json"
            git push
          fi
