<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dumpboard</title>
<!--
  Entry router — small file so GitHub Pages refreshes it quickly.
  First visit → start.html (landing). Return visits → hub.html (feed).
-->
<script>
(function () {
  var key = "dumpboard_intro_seen";
  var dest = "start.html";
  try {
    if (localStorage.getItem(key)) dest = "hub.html";
  } catch (e) {}
  location.replace(dest);
})();
</script>
<style>
  body { margin: 0; background: #0e0e0e; color: #fff; font-family: system-ui, sans-serif;
         display: flex; align-items: center; justify-content: center; min-height: 100vh; }
</style>
</head>
<body>
<p>Loading…</p>
</body>
</html>
